name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Thunderbird or Betterbird version
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Search mode
      options:
        - Global account search
        - Current-folder search
        - Both
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Remove private message content and addresses.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant console output
      render: text

